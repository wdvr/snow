name: Android Internal Testing

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta

concurrency:
  group: android-release
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  build-and-upload:
    name: Build & Upload to Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Calculate version
      id: version
      run: |
        BUILD=$(git rev-list --count HEAD)
        VERSION=$(grep 'versionName' android/app/build.gradle.kts | head -1 | grep -oP '"[^"]*"' | tr -d '"')
        echo "version=${VERSION:-1.0.0}" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "Building version ${VERSION:-1.0.0} ($BUILD)"

        # Update versionCode in build.gradle.kts
        cd android
        sed -i "s/versionCode = [0-9]*/versionCode = $BUILD/" app/build.gradle.kts

    - name: Run unit tests
      run: |
        cd android
        ./gradlew testProdReleaseUnitTest --no-daemon

    - name: Decode keystore
      run: |
        echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

    - name: Build release AAB
      run: |
        cd android
        ./gradlew bundleProdRelease --no-daemon
      env:
        KEYSTORE_FILE: release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: aab-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}
        path: android/app/build/outputs/bundle/prodRelease/*.aab
        retention-days: 30

    - name: Upload to Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.powderchaserapp.android
        releaseFiles: android/app/build/outputs/bundle/prodRelease/*.aab
        track: ${{ inputs.track }}
        status: completed
        whatsNewDirectory: android/whatsnew

    - name: Summary
      run: |
        echo "## Android Release Upload" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Track**: ${{ inputs.track }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Package**: com.powderchaserapp.android" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The AAB has been uploaded to the Play Store **${{ inputs.track }}** track." >> $GITHUB_STEP_SUMMARY

    - name: Cleanup
      if: always()
      run: |
        rm -f android/app/release.keystore
