name: Android Build

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Calculate version
      id: version
      run: |
        BUILD=$(git rev-list --count HEAD)
        VERSION=$(grep 'versionName' android/app/build.gradle.kts | head -1 | grep -oP '"[^"]*"' | tr -d '"')
        echo "version=${VERSION:-1.0.0}" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "Building version ${VERSION:-1.0.0} ($BUILD)"

    - name: Run unit tests
      run: |
        cd android
        ./gradlew testDevDebugUnitTest --no-daemon

    - name: Build debug APK
      run: |
        cd android
        ./gradlew assembleDevDebug --no-daemon

    - name: Build staging APK
      if: github.event_name != 'pull_request'
      run: |
        cd android
        ./gradlew assembleStagingDebug --no-daemon

    - name: Upload debug APK
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: apk-dev-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}
        path: android/app/build/outputs/apk/dev/debug/*.apk
        retention-days: 14

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: android/app/build/reports/tests/
        if-no-files-found: ignore

    - name: Summary
      run: |
        echo "## Android Build Successful" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }})" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Tests**: Unit tests passed" >> $GITHUB_STEP_SUMMARY
        if [ "${{ github.event_name }}" != "pull_request" ]; then
          echo "- **Artifact**: apk-dev-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}" >> $GITHUB_STEP_SUMMARY
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Run Android Lint
      run: |
        cd android
        ./gradlew lintDevDebug --no-daemon
      continue-on-error: true

    - name: Upload lint results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: android/app/build/reports/lint*.html
        if-no-files-found: ignore
