name: PowderChaser
options:
  bundleIdPrefix: com.wouterdevriendt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.8.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: 8.0.0
  Get:
    url: https://github.com/CreateAPI/Get.git
    from: 2.1.0
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: 12.1.0
  KeychainSwift:
    url: https://github.com/evgenyneu/keychain-swift.git
    from: 20.0.0

targets:
  PowderChaser:
    type: application
    platform: iOS
    sources:
      - path: PowderChaser/PowderChaser/Sources
      - path: PowderChaser/PowderChaser/Resources
    settings:
      base:
        INFOPLIST_FILE: PowderChaser/Info.plist
        PRODUCT_NAME: Powder Chaser
        PRODUCT_MODULE_NAME: PowderChaser
        PRODUCT_BUNDLE_IDENTIFIER: com.wouterdevriendt.snowtracker
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: N324UX8D9M
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AppIcon-Mountain AppIcon-Minimal AppIcon-Gradient AppIcon-Dark AppIcon-Neon AppIcon-Warm AppIcon-Forest AppIcon-Bold"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: PowderChaser/PowderChaser.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.wouterdevriendt.snowtracker
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: Alamofire
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Get
      - package: Nuke
      - package: KeychainSwift
      - target: PowderChaserWidgetExtension
    info:
      path: PowderChaser/Info.plist
      properties:
        CFBundleName: Powder Chaser
        CFBundleDisplayName: Powder Chaser
        CFBundleShortVersionString: "2.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Privacy - Location Usage
        NSLocationWhenInUseUsageDescription: "Powder Chaser uses your location to show nearby ski resorts and calculate distances to resorts."
        # App Store compliance
        ITSAppUsesNonExemptEncryption: false
        # Google Sign-In configuration
        GIDClientID: 269334695221-p2i31pdp3n7ms7o7rpf6cb3vsdmc4ohs.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.269334695221-p2i31pdp3n7ms7o7rpf6cb3vsdmc4ohs

  PowderChaserWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PowderChaserWidget
    settings:
      base:
        INFOPLIST_FILE: PowderChaserWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wouterdevriendt.snowtracker.widget
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: N324UX8D9M
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: PowderChaserWidget/PowderChaserWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wouterdevriendt.snowtracker
    info:
      path: PowderChaserWidget/Info.plist
      properties:
        CFBundleName: Powder Chaser Widget
        CFBundleDisplayName: Powder Chaser Widget
        CFBundleShortVersionString: "2.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PowderChaserTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PowderChaser/PowderChaserTests
        optional: true
    dependencies:
      - target: PowderChaser
    settings:
      base:
        INFOPLIST_FILE: PowderChaser/PowderChaserTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Powder Chaser.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Powder Chaser"

  PowderChaserUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PowderChaser/PowderChaserUITests
        optional: true
    dependencies:
      - target: PowderChaser
    settings:
      base:
        INFOPLIST_FILE: PowderChaser/PowderChaserUITests/Info.plist
        TEST_TARGET_NAME: PowderChaser

schemes:
  PowderChaser:
    build:
      targets:
        PowderChaser: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PowderChaserTests
        - PowderChaserUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
